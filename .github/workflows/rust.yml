name: Rust CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

  cross_check_arm:
    name: Cross-check (ARM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf libusb-1.0-0-dev:amd64
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu, arm-unknown-linux-gnueabihf
      - name: Check aarch64 (ARMv8)
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo check --target aarch64-unknown-linux-gnu --verbose
      - name: Check armv7 (ARMv7)
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          cargo check --target arm-unknown-linux-gnueabihf --verbose

  build_windows:
    name: Build & Lint (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose
      - name: Lint with Clippy
        run: cargo clippy -- -D warnings

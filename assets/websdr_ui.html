<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>rtlsdr-next WebSDR</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body { background: #0a0a0c; color: #eee; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        .controls { display: flex; gap: 20px; align-items: center; margin-bottom: 20px; background: #1a1a1c; padding: 15px; border-radius: 8px; border: 1px solid #333; flex-wrap: wrap; }
        .freq-display { font-family: monospace; font-size: 1.5em; color: #00ff00; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid #004400; min-width: 180px; text-align: right; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.8em; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .label-val { color: #aaa; font-weight: bold; margin-left: 5px; }
        input[type="number"] { background: #222; color: #fff; border: 1px solid #444; padding: 8px; width: 100px; border-radius: 4px; outline: none; }
        input[type="number"]:focus { border-color: #007bff; }
        select { background: #222; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; outline: none; }
        button { background: #333; color: white; border: 1px solid #444; padding: 8px 15px; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        button:hover { background: #444; border-color: #666; }
        button.active { background: #007bff; border-color: #0056b3; }
        .canvas-container { position: relative; background: #000; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
        canvas { display: block; width: 100%; image-rendering: pixelated; }
        .status { margin-top: 10px; font-size: 0.9em; color: #888; display: flex; justify-content: space-between; }
        .slider { width: 120px; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="controls">
        <div class="input-group">
            <label>Frequency (MHz)</label>
            <div style="display: flex; gap: 5px; align-items: center;">
                <input type="number" id="freq-mhz" value="100.000" step="0.001" onchange="updateFreq()">
                <div class="freq-display" id="freq-display">100.000.000</div>
            </div>
        </div>

        <div class="input-group">
            <label>Step</label>
            <select id="freq-step">
                <option value="1.0">1 MHz</option>
                <option value="0.1">100 kHz</option>
                <option value="0.025">25 kHz</option>
                <option value="0.0125">12.5 kHz</option>
                <option value="0.001" selected>1 kHz</option>
            </select>
        </div>

        <div class="input-group">
            <label>RF Gain <span id="gain-val" class="label-val">30.0 dB</span></label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span style="font-size: 0.7em; color: #555;">0.0</span>
                <input type="range" class="slider" id="gain" min="0" max="49.6" step="0.1" value="30" oninput="setGain()">
                <span style="font-size: 0.7em; color: #555;">49.6</span>
            </div>
        </div>

        <div class="input-group">
            <label>Mode</label>
            <div style="display: flex; gap: 5px;">
                <button id="mode-fm" class="active" onclick="setMode('fm')">FM</button>
                <button id="mode-am" onclick="setMode('am')">AM</button>
            </div>
        </div>

        <div class="input-group">
            <label>Audio Vol <span id="vol-val" class="label-val">100%</span></label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="audio-btn" onclick="toggleAudio()">Start Audio</button>
                <input type="range" class="slider" id="volume" min="0" max="2" step="0.1" value="1.0" oninput="updateVolume()">
            </div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="view" width="1024" height="800"></canvas>
    </div>

    <div class="status">
        <div id="status">Connecting...</div>
        <div id="hw-info">Hardware: Searching...</div>
    </div>

    <script>
        let ws;
        let reconnectDelay = 1000;
        const canvas = document.getElementById('view');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const hwInfo = document.getElementById('hw-info');
        const freqInput = document.getElementById('freq-mhz');
        const freqDisplay = document.getElementById('freq-display');
        
        // Layout Constants
        const SPECTRUM_HEIGHT = 200;
        const WATERFALL_HEIGHT = canvas.height - SPECTRUM_HEIGHT;
        
        // Waterfall logic
        const rowData = ctx.createImageData(canvas.width, 1);
        
        // Spectrum Smoothing
        let smoothedMag = new Float32Array(canvas.width).fill(0);
        const smoothing = 0.7;

        // Audio logic
        let audioCtx = null;
        let gainNode = null;
        let nextStartTime = 0;
        const SAMPLE_RATE = 51200; 

        // Keyboard tuning
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            const step = parseFloat(document.getElementById('freq-step').value);
            if (e.key === 'ArrowUp') {
                freqInput.value = (parseFloat(freqInput.value) + step).toFixed(4);
                updateFreq();
            } else if (e.key === 'ArrowDown') {
                freqInput.value = (parseFloat(freqInput.value) - step).toFixed(4);
                updateFreq();
            }
        });
        
        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.hostname || 'localhost'}:8080/ws`);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => { 
                status.innerText = 'Connected to Backend'; 
                reconnectDelay = 1000;
            };

            ws.onclose = () => {
                status.innerText = `Disconnected. Reconnecting...`;
                setTimeout(connect, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, 30000);
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'hardwareinfo') {
                        hwInfo.innerText = `${msg.manufacturer} ${msg.product} (V4: ${msg.is_v4})`;
                    } else if (msg.type === 'freqconfirm') {
                        const mhz = (msg.actual / 1000000).toFixed(6);
                        freqInput.value = mhz;
                        freqDisplay.innerText = msg.actual.toLocaleString().replace(/,/g, '.');
                    } else if (msg.type === 'gainconfirm') {
                        document.getElementById('gain').value = msg.actual;
                        document.getElementById('gain-val').innerText = msg.actual.toFixed(1) + ' dB';
                    } else if (msg.type === 'demodconfirm') {
                        document.querySelectorAll('[id^="mode-"]').forEach(b => b.classList.remove('active'));
                        const btn = document.getElementById(`mode-${msg.actual}`);
                        if (btn) btn.classList.add('active');
                    }
                    return;
                }

                const buffer = event.data;
                const view = new DataView(buffer);
                const type = String.fromCharCode(view.getUint8(0));

                if (type === 'W') {
                    const magnitudes = new Uint8Array(buffer, 1);
                    
                    // 1. Draw Spectrum Line
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, SPECTRUM_HEIGHT);
                    
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    
                    for (let i = 0; i < magnitudes.length; i++) {
                        const m = magnitudes[i];
                        smoothedMag[i] = (smoothedMag[i] * smoothing) + (m * (1.0 - smoothing));
                        const y = SPECTRUM_HEIGHT - (smoothedMag[i] / 255 * (SPECTRUM_HEIGHT - 20)) - 10;
                        if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
                    }
                    ctx.stroke();

                    // 2. Shift and Draw Waterfall
                    // Copy existing waterfall down one pixel
                    ctx.drawImage(canvas, 
                        0, SPECTRUM_HEIGHT, canvas.width, WATERFALL_HEIGHT - 1, 
                        0, SPECTRUM_HEIGHT + 1, canvas.width, WATERFALL_HEIGHT - 1
                    );
                    
                    for (let i = 0; i < magnitudes.length; i++) {
                        const m = magnitudes[i];
                        rowData.data[i * 4 + 0] = Math.max(0, Math.min(255, (m - 128) * 2)); 
                        rowData.data[i * 4 + 1] = Math.max(0, Math.min(255, 255 - Math.abs(m - 128) * 2));
                        rowData.data[i * 4 + 2] = Math.max(0, Math.min(255, (128 - m) * 2));
                        rowData.data[i * 4 + 3] = 255;             
                    }
                    ctx.putImageData(rowData, 0, SPECTRUM_HEIGHT);
                    
                } else if (type === 'A' && audioCtx && audioCtx.state === 'running') {
                    const samples = new Float32Array(buffer, 4);
                    const audioBuffer = audioCtx.createBuffer(1, samples.length, SAMPLE_RATE);
                    audioBuffer.getChannelData(0).set(samples);
                    const source = audioCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(gainNode);
                    
                    const currentTime = audioCtx.currentTime;
                    if (nextStartTime < currentTime) {
                        nextStartTime = currentTime + 0.1; 
                    }
                    source.start(nextStartTime);
                    nextStartTime += audioBuffer.duration;
                }
            };
        }

        function updateFreq() {
            const hz = Math.round(parseFloat(freqInput.value) * 1000000);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'frequency', hz }));
            }
        }

        function setGain() {
            const db = parseFloat(document.getElementById('gain').value);
            document.getElementById('gain-val').innerText = db.toFixed(1) + ' dB';
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'gain', db }));
            }
        }

        function setMode(mode) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'demod', mode }));
            }
        }

        function updateVolume() {
            const vol = parseFloat(document.getElementById('volume').value);
            document.getElementById('vol-val').innerText = Math.round(vol * 100) + '%';
            if (gainNode) {
                gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.02);
            }
        }

        function toggleAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({
                    sampleRate: SAMPLE_RATE
                });
                gainNode = audioCtx.createGain();
                gainNode.connect(audioCtx.destination);
                updateVolume();
                
                nextStartTime = 0; // RESET start time on toggle
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                document.getElementById('audio-btn').innerText = 'Audio ON';
                document.getElementById('audio-btn').classList.add('active');
            } else {
                audioCtx.close().then(() => {
                    audioCtx = null;
                    gainNode = null;
                    nextStartTime = 0;
                    document.getElementById('audio-btn').innerText = 'Start Audio';
                    document.getElementById('audio-btn').classList.remove('active');
                });
            }
        }

        connect();
    </script>
</body>
</html>
